<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리AI - 나의 공간</title>

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/includes/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
    <script th:src="@{/js/includes/header.js}"></script>
</head>
<body>

<div th:replace="includes/header :: header"></div>

<div class="kids-container">

    <div class="welcome-section">
        <h2 class="welcome-title">
            안녕, <span class="highlight">우리</span>야!<br>
            오늘 하루는 어땠어?
        </h2>
        <p class="welcome-desc">너의 이야기를 들려줄래? 비밀은 지켜줄게!</p>
    </div>

    <div class="action-grid">

        <a href="/diary/write" class="action-card card-write">
            <div class="card-image">
                <i class="fa-solid fa-pencil action-icon"></i>
            </div>
            <div class="card-text">
                <h3>일기 쓰기</h3>
                <p>오늘 있었던 일을<br>자유롭게 적어봐요</p>
            </div>
            <div class="card-btn">Go!</div>
        </a>

        <a href="/analysis/result" class="action-card card-analysis">
            <div class="card-image">
                <i class="fa-solid fa-heart-pulse action-icon"></i>
            </div>
            <div class="card-text">
                <h3>마음 날씨</h3>
                <p>내 마음은 지금<br>맑음일까? 흐림일까?</p>
            </div>
            <div class="card-btn">확인하기</div>
        </a>

        <a href="/diary/list" class="action-card card-history">
            <div class="card-image">
                <i class="fa-solid fa-book-open action-icon"></i>
            </div>
            <div class="card-text">
                <h3>지난 이야기</h3>
                <p>내가 썼던 일기들을<br>다시 읽어봐요</p>
            </div>
            <div class="card-btn">보러가기</div>
        </a>

    </div>
</div>

</body>
</html>
