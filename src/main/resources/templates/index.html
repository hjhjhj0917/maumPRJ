<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음 - 나를 위한 감정 기록</title>

    <link rel="stylesheet" th:href="@{/css/includes/header.css}">
    <link rel="stylesheet" th:href="@{/css/includes/footer.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
    <script th:src="@{/js/includes/header.js}"></script>
    <script th:src="@{/js/index.js}"></script>
</head>
<body>

<div th:replace="includes/header :: header"></div>

<div class="main-content">

    <section class="hero-section full-page">
        <div class="hero-bg" style="background-image: url('/images/main-background.png');"></div>
        <div class="hero-overlay"></div>

        <div class="hero-container">
            <div class="hero-text-box scroll-target">
                <h1 class="main-title">
                    수많은 소음 속,<br>
                    <span class="highlight">온전히 나에게 집중하는 시간</span>
                </h1>
                <p class="sub-title">
                    오늘 하루, 당신의 마음은 안녕한가요?<br>
                    누구에게도 말 못한 고민이 있다면 MAUM에 털어놓으세요.<br>
                    AI가 당신의 하루를 듣고 따뜻한 위로와 분석을 건넵니다.
                </p>
                <div class="hero-buttons">
                    <a href="/account/login" class="btn-primary">시작하기</a>
                </div>
            </div>
        </div>
    </section>

    <section class="hero-section full-page">
        <div class="split-container">
            <a href="/diary/write" class="split-panel">
                <div class="panel-overlay"></div>
                <div class="panel-content">
                    <h4>일기 작성하기</h4>
                </div>
            </a>

            <a href="/diary/analysis" class="split-panel">
                <div class="panel-overlay"></div>
                <div class="panel-content">
                    <h4>분석 결과</h4>
                </div>
            </a>

            <a href="/diary/list" class="split-panel">
                <div class="panel-overlay"></div>
                <div class="panel-content">
                    <h4>일기 보관소</h4>
                </div>
            </a>
        </div>
    </section>

    <div class="footer-wrapper full-page">
        <div class="stats-section">
            <div class="stat-item">
                <span class="stat-number">1,204</span>
                <span class="stat-label">기록된 마음</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-number">582</span>
                <span class="stat-label">위로받은 사람</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-number">365</span>
                <span class="stat-label">함께한 시간</span>
            </div>
        </div>
        <div style="width: 100%;" th:replace="includes/footer :: footer"></div>
    </div>

</div>

</body>
</html>
