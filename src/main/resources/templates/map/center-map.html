<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 주변 상담소 - 마음이야</title>

  <link rel="stylesheet" th:href="@{/css/includes/header.css}">
  <link rel="stylesheet" th:href="@{/css/includes/footer.css}">
  <link rel="stylesheet" th:href="@{/css/map/center-map.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
  <script th:src="@{/js/includes/header.js}"></script>
  <script th:src="@{/js/map/center-map.js}"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div th:replace="includes/header :: header"></div>

<div class="map-container">

  <div class="sidebar">
    <div class="sidebar-header">
      <h2>내 주변 상담소</h2>
      <p>가까운 전문 상담센터를 찾아보세요.</p>
      <div class="current-location-box">
        <i class="fas fa-map-marker-alt"></i>
        <span id="currentAddr">서울시 강서구 우장산로</span>
      </div>
    </div>

    <div class="center-list" id="centerList">
    </div>
  </div>

  <div class="map-wrapper">
    <div id="map"></div>
    <button class="btn-my-location" id="btnMyLocation" title="내 위치로 이동">
      <i class="fas fa-crosshairs"></i>
    </button>
  </div>

</div>

</body>
</html>
