<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>

    <link rel="stylesheet" th:href="@{/css/account/login.css}">
    <link rel="stylesheet" th:href="@{/css/includes/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
    <script th:src="@{/js/account/login.js}"></script>
    <script th:src="@{/js/includes/header.js}"></script>
</head>
<body>

<div th:replace="includes/header :: header"></div>

<div class="container">

    <div class="slider-section">
        <div class="slider-wrapper">
            <div class="slide active">
                <h2>Creative.</h2>
                <p>우리 서비스의 첫 번째 장점을 소개합니다.<br>마우스를 오른쪽 영역에 올려보세요.</p>
            </div>
            <div class="slide">
                <h2>Smart.</h2>
                <p>자동화된 시스템으로 더 편리하게 관리하세요.<br>로그인 화면이 확장됩니다.</p>
            </div>
            <div class="slide">
                <h2>Secure.</h2>
                <p>당신의 소중한 정보를 안전하게 지킵니다.<br>비밀번호 찾기도 가능합니다.</p>
            </div>
        </div>

        <div class="dots-container">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>

    <div class="login-section">
        <div class="login-card">
            <h3>YOUR COMPANY</h3>

            <form action="#" method="POST">
                <div class="input-group">
                    <label for="userId">User ID</label>
                    <input type="text" id="userId" name="userId" placeholder="아이디를 입력하세요" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>

                <button type="submit" class="btn-login">로그인</button>
            </form>

            <div class="find-links">
                <div class="find-row">
                    <a href="/account/find-id">아이디 찾기</a>
                    <span class="separator">|</span>
                    <a href="/account/find-pw">비밀번호 찾기</a>
                </div>
            </div>

            <div class="signup-box">
                아직 회원이 아니시라면, 지금 바로 샤쿠로를 시작해 보세요. <a href="/account/register" class="link-signup">회원가입</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
