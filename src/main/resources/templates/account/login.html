<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 마음</title>

    <link rel="stylesheet" th:href="@{/css/account/login.css}">
    <link rel="stylesheet" th:href="@{/css/includes/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
    <script th:src="@{/js/account/login.js}"></script>
    <script th:src="@{/js/includes/header.js}"></script>
</head>
<body>

<div th:replace="includes/header :: header"></div>

<div class="container">

    <div class="slider-section">

        <div class="bg-slider">
            <div class="bg-slide active" style="background-image: url('/images/account/login-background1.jpg');"></div>
            <div class="bg-slide" style="background-image: url('/images/account/login-background2.jpg');"></div>
            <div class="bg-slide" style="background-image: url('/images/account/login-background3.jpg');"></div>
        </div>

        <div class="slider-overlay"></div>

        <div class="slider-wrapper">
            <div class="slide active">
                <h2>Memory.</h2>
                <p>흘러가면 잊혀질 오늘의 순간을 소중하게 기억합니다.<br>빛나는 청춘의 한 페이지를 이곳에 남겨두세요.</p>
            </div>
            <div class="slide">
                <h2>Journal.</h2>
                <p>복잡한 머릿속 생각들을 차분하게 기록합니다.<br>나만의 속도로 써 내려가는 글이 마음의 쉼표가 됩니다.</p>
            </div>
            <div class="slide">
                <h2>Mood.</h2>
                <p>글 속에 담긴 내면의 소리와 감정 상태를 분석합니다.<br>스스로도 몰랐던 나의 진짜 마음을 마주해보세요.</p>
            </div>
        </div>

        <div class="dots-container">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>

    <div class="login-section">
        <div class="login-card">
            <img th:src="@{/images/includes/logo.png}" alt="마음 로고" class="login-logo-title">

            <form id="loginForm" onsubmit="return false;">
                <div class="input-group">
                    <div class="label-row">
                        <label for="userId">User ID</label>
                        <span class="field-message" id="userIdMsg"></span>
                    </div>
                    <input type="text" id="userId" name="userId" placeholder="아이디를 입력하세요" required autocomplete="off">
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <span class="field-message" id="passwordMsg"></span>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                        <i class="fa-regular fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <button type="button" class="btn-login" onclick="doLogin()">로그인</button>
            </form>

            <div class="find-links">
                <div class="find-row">
                    <a href="/account/find-id">아이디 찾기</a>
                    <span class="separator">|</span>
                    <a href="/account/find-pw">비밀번호 찾기</a>
                </div>
            </div>

            <div class="signup-box">
                아직 회원이 아니시라면, 지금 바로 마음이야를 시작해 보세요. <a href="/account/register" class="link-signup">회원가입</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
