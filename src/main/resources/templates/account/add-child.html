<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자녀 등록 - 우리AI</title>

  <link rel="stylesheet" th:href="@{/css/account/add-child.css}">
  <link rel="stylesheet" th:href="@{/css/includes/header.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
  <script th:src="@{/js/includes/header.js}"></script>
  <script th:src="@{/js/account/add-child.js}"></script>
</head>
<body>

<div th:replace="includes/header :: header"></div>

<div class="container">
  <div class="add-child-card">
    <h3>자녀 정보 등록</h3>
    <p class="description">아이의 맞춤형 분석을 위해 기본 정보를 입력해 주세요.</p>

    <form action="/account/add-child" method="POST">

      <div class="profile-select-section">
        <label>Profile Image</label>

        <div class="current-avatar-wrapper">
          <img id="currentAvatar" th:src="@{/images/account/profile1.jpg}" alt="Current Avatar">
        </div>

        <div class="avatar-grid">
          <img th:src="@{/images/account/profile1.jpg}" class="avatar-item selected" onclick="selectAvatar(this)">
          <img th:src="@{/images/account/profile2.jpg}" class="avatar-item" onclick="selectAvatar(this)">
          <img th:src="@{/images/account/profile3.jpg}" class="avatar-item" onclick="selectAvatar(this)">
          <img th:src="@{/images/account/profile4.jpg}" class="avatar-item" onclick="selectAvatar(this)">
          <img th:src="@{/images/account/profile5.jpg}" class="avatar-item" onclick="selectAvatar(this)">
        </div>

        <input type="hidden" id="selectedAvatar" name="selectedAvatar" value="/images/account/profile1.jpg">
      </div>

      <div class="input-group">
        <label for="childName">Name</label>
        <input type="text" id="childName" name="childName" placeholder="아이의 이름을 입력하세요." required>
      </div>

      <div class="input-group">
        <label for="birthDate">Birth Date</label>
        <input type="date" id="birthDate" name="birthDate" required>
      </div>

      <div class="input-group">
        <label>Gender</label>
        <div class="gender-selector">
          <input type="radio" id="male" name="gender" value="Male" checked>
          <label for="male" class="gender-option">아들</label>

          <input type="radio" id="female" name="gender" value="Female">
          <label for="female" class="gender-option">딸</label>
        </div>
      </div>

      <div class="input-group">
        <label for="etcInfo">Etc (Optional)</label>
        <textarea id="etcInfo" name="etcInfo" rows="3" placeholder="아이의 성향이나 특이사항이 있다면 적어주세요."></textarea>
      </div>

      <button type="submit" class="btn-register">등록하기</button>
    </form>

    <div class="skip-box">
      <a href="/" class="link-skip">다음에 등록하기</a>
    </div>

  </div>
</div>

</body>
</html>
