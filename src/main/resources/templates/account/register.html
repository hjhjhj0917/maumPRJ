<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 마음(MAUM)</title>

    <link rel="stylesheet" th:href="@{/css/account/register.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
    <script th:src="@{/js/account/register.js}"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script src="https://unpkg.com/validator@latest/validator.min.js"></script>
</head>
<body>

<div th:replace="includes/header :: header"></div>
<div th:replace="includes/customModal :: customModal"></div>

<div class="container">
    <div class="register-card">

        <div class="stepper-wrapper">
            <div class="stepper-item active" id="stepper1">
                <div class="step-label">인증</div>
                <div class="step-circle"><i class="fa-solid fa-check"></i></div>
            </div>
            <div class="step-line"></div>
            <div class="stepper-item" id="stepper2">
                <div class="step-label">계정정보</div>
                <div class="step-circle"><i class="fa-solid fa-check"></i></div>
            </div>
            <div class="step-line"></div>
            <div class="stepper-item" id="stepper3">
                <div class="step-label">개인정보</div>
                <div class="step-circle"><i class="fa-solid fa-check"></i></div>
            </div>
        </div>

        <form action="/account/register" method="POST" id="registerForm">
            <div class="slide-viewport">
                <div class="slide-track" id="slideTrack">

                    <div class="form-step active-slide" id="step1">
                        <div class="auth-inputs">
                            <div class="input-group">
                                <div class="label-row">
                                    <label for="email">E-mail</label>
                                    <span class="field-message" id="emailMsg"></span>
                                </div>
                                <div class="flex-row">
                                    <input type="email" id="email" name="email" placeholder="이메일을 입력하세요.">
                                    <button type="button" id="btnEmail" class="btn-check">인증번호 발송</button>
                                </div>
                            </div>

                            <div class="input-group">
                                <div class="label-row">
                                    <label for="code">Code</label>
                                    <span class="field-message" id="codeMsg"></span>
                                </div>
                                <div class="flex-row">
                                    <input type="text" id="code" placeholder="인증번호를 입력하세요.">
                                    <button type="button" class="btn-check">인증 확인</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-step" id="step2">
                        <div class="auth-inputs">
                            <div class="input-group">
                                <div class="label-row">
                                    <label for="userId">User ID</label>
                                    <span class="field-message" id="userIdMsg"></span>
                                </div>
                                <div class="flex-row">
                                    <input type="text" id="userId" name="userId" placeholder="아이디를 입력하세요.">
                                    <button type="button" class="btn-check">중복확인</button>
                                </div>
                            </div>

                            <div class="input-group">
                                <div class="label-row">
                                    <label for="password">Password</label>
                                    <span class="field-message" id="passwordMsg"></span>
                                </div>
                                <div class="password-wrapper">
                                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요">
                                    <i class="fa-regular fa-eye toggle-password"></i>
                                </div>
                            </div>

                            <div class="input-group">
                                <div class="label-row">
                                    <label for="passwordConfirm">Confirm Password</label>
                                    <span class="field-message" id="passwordConfirmMsg"></span>
                                </div>
                                <div class="password-wrapper">
                                    <input type="password" id="passwordConfirm" placeholder="비밀번호를 다시 입력하세요.">
                                    <i class="fa-regular fa-eye toggle-password"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-step" id="step3">
                        <div class="auth-inputs">
                            <div class="input-group">
                                <div class="label-row">
                                    <label for="userName">Name</label>
                                    <span class="field-message" id="userNameMsg"></span>
                                </div>
                                <input type="text" id="userName" name="userName" placeholder="이름을 입력하세요.">
                            </div>

                            <div class="input-group" style="position: relative;">
                                <div class="label-row">
                                    <label for="birthDate">Birth Date</label>
                                    <span class="field-message" id="birthDateMsg"></span>
                                </div>
                                <input type="text" id="birthDate" name="birthDate" placeholder="YYYY-MM-DD" readonly style="cursor: pointer; background-color: #fff;">

                                <div id="customRollerPicker" class="roller-picker-container" style="display: none;">
                                    <div class="roller-picker-body">
                                        <div class="roller-highlight"></div>
                                        <div class="roller-col" id="col-year"></div>
                                        <div class="roller-col" id="col-month"></div>
                                        <div class="roller-col" id="col-day"></div>
                                    </div>
                                    <div class="roller-picker-footer">
                                        <button type="button" id="btnPickerConfirm">확인</button>
                                    </div>
                                </div>
                            </div>

                            <div class="input-group">
                                <div class="label-row">
                                    <label for="address">Address</label>
                                    <span class="field-message" id="addrMsg"></span>
                                </div>
                                <div class="flex-row">
                                    <input type="text" id="address" name="addr" placeholder="주소를 입력하세요." readonly>
                                    <button type="button" class="btn-check">우편번호</button>
                                </div>
                            </div>

                            <div class="input-group">
                                <div class="label-row">
                                    <label for="detailAddr">Apartment, etc ...</label>
                                    <span class="field-message" id="detailAddrMsg"></span>
                                </div>
                                <input type="text" id="detailAddr" name="detailAddr" placeholder="상세주소를 입력하세요.">
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="action-buttons">
                <div class="btn-step-group active" id="btns1">
                    <div class="btn-row right">
                        <button type="button" class="btn-next" onclick="nextStep(2)">다음</button>
                    </div>
                </div>

                <div class="btn-step-group" id="btns2">
                    <div class="btn-row split">
                        <button type="button" class="btn-prev" onclick="prevStep(1)">이전</button>
                        <button type="button" class="btn-next" onclick="nextStep(3)">다음</button>
                    </div>
                </div>

                <div class="btn-step-group" id="btns3">
                    <div class="btn-row split">
                        <button type="button" class="btn-prev" onclick="prevStep(2)">이전</button>
                        <button type="submit" class="btn-submit">가입하기</button>
                    </div>
                </div>
            </div>
        </form>

        <div class="login-box">
            이미 마음(MAUM) 회원이신가요?
            <a href="/account/login" class="link-login">로그인</a>
        </div>
    </div>
</div>

</body>
</html>
