<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 찾기 - 우리AI</title>

  <link rel="stylesheet" th:href="@{/css/account/find-pw.css}">
  <link rel="stylesheet" th:href="@{/css/includes/header.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
  <script th:src="@{/js/includes/header.js}"></script>
</head>
<body>

<div th:replace="includes/header :: header"></div>

<div class="container">
  <div class="find-pw-card">
    <h3>비밀번호 찾기</h3>

    <form action="/account/find-pw" method="POST">

      <div class="input-group">
        <label for="userId">User ID</label>
        <input type="text" id="userId" name="userId" placeholder="아이디를 입력하세요." required>
      </div>

      <div class="input-group">
        <label for="userEmail">E-mail</label>
        <input type="email" id="userEmail" name="userEmail" placeholder="가입한 이메일을 입력하세요." required>
      </div>

      <button type="submit" class="btn-confirm">확인</button>
    </form>

    <div class="auth-links">
      <a href="/account/login">ㅤ ㅤ로그인</a>
      <span class="separator">|</span>
      <a href="/account/find-id">아이디 찾기</a>
    </div>

    <div class="signup-box">아직 회원이 아니시라면, 지금 바로 우리AI를 시작해 보세요.
      <a href="/account/register" class="link-signup">회원가입</a>
    </div>

  </div>
</div>

</body>
</html>
