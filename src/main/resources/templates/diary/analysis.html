<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음 분석 - 마음이야</title>
  <link rel="stylesheet" th:href="@{/css/includes/header.css}">
  <link rel="stylesheet" th:href="@{/css/includes/footer.css}">
  <link rel="stylesheet" th:href="@{/css/diary/analysis.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script th:src="@{/js/jquery-3.6.0.min.js}"></script>
  <script th:src="@{/js/includes/header.js}"></script>
  <script th:src="@{/js/diary/analysis.js}"></script>
</head>
<body>

<div th:replace="includes/header :: header"></div>

<div class="analysis-container">
  <div class="dashboard-wrapper fade-in">

    <div class="dashboard-header">
      <div class="title-section">
        <h2>마음 분석 리포트</h2>
        <p>당신의 감정 흐름을 시각적으로 확인해보세요.</p>
      </div>

      <div class="controls-section">
        <div class="toggle-switch">
          <button class="toggle-btn active" data-period="weekly">주간</button>
          <button class="toggle-btn" data-period="monthly">월간</button>
        </div>
        <div class="date-navigator">
          <button class="nav-btn"><i class="fas fa-chevron-left"></i></button>
          <span id="currentDateRange">2025년 12월 4주차</span>
          <button class="nav-btn"><i class="fas fa-chevron-right"></i></button>
        </div>
      </div>
    </div>

    <div class="charts-grid">

      <div class="chart-card main-trend">
        <div class="card-header">
          <h3>감정 변화 추이</h3>
          <div class="legend-custom">
            <div class="legend-item"><span class="dot happy"></span>긍정</div>
            <div class="legend-item"><span class="dot sad"></span>부정</div>
            <div class="legend-item"><span class="dot stress"></span>스트레스</div>
          </div>
        </div>
        <div class="canvas-wrapper">
          <canvas id="trendChart"></canvas>
        </div>
      </div>

      <div class="chart-card emotion-dist">
        <div class="card-header">
          <h3>주요 감정 분포</h3>
        </div>
        <div class="canvas-wrapper doughnut-wrapper">
          <canvas id="distributionChart"></canvas>
        </div>
        <div class="dist-summary">
          <p>이번 주는 <strong>평온함</strong>이 가장 컸어요.</p>
        </div>
      </div>

      <div class="insight-card">
        <div class="card-header">
          <h3>AI 마음 코멘트</h3>
          <i class="fas fa-robot"></i>
        </div>
        <div class="insight-body">
          <div class="insight-text">
            전반적으로 긍정적인 감정이 상승하는 추세입니다.
            주 초반에는 약간의 스트레스가 보였지만,
            수요일 이후로 안정을 되찾으셨네요.
            <br><br>
            자신만의 시간을 가졌던 것이 큰 도움이 된 것 같습니다.
            주말에는 가벼운 산책으로 기분을 환기해보는 건 어떨까요?
          </div>
          <div class="keyword-tags">
            <span>#회복탄력성</span>
            <span>#안정감</span>
            <span>#소소한행복</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
